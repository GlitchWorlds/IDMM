<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>IDMAM Downloads</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">⚡ IDMAM</div>
      <span class="version">v1.0</span>
    </div>
    <div class="header-right">
      <span id="status-badge" class="status-badge status-offline" title="Server status">Offline</span>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Add download bar -->
  <div class="add-bar">
    <input type="text" id="input-url" placeholder="Paste download URL..." autocomplete="off" spellcheck="false">
    <button id="btn-add" title="Add download">+</button>
  </div>

  <!-- Save path hint (E9) -->
  <div id="save-path-hint" class="save-path-hint" style="display:none"></div>

  <!-- Filter tabs -->
  <div class="tabs">
    <button class="tab active" data-filter="active">Active</button>
    <button class="tab" data-filter="paused">Paused</button>
    <button class="tab" data-filter="completed">Done</button>
    <button class="tab" data-filter="all">All</button>
  </div>

  <!-- Downloads list -->
  <div id="downloads-list" class="downloads-list">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">📥</div>
      <div class="empty-text">No active downloads</div>
      <div class="empty-hint">Right-click a link → "Download with IDMAM"</div>
    </div>
  </div>

  <!-- Footer stats -->
  <footer class="footer">
    <span id="stats-active">0 active</span>
    <span class="footer-sep">·</span>
    <span id="stats-speed">0 B/s</span>
    <span class="footer-sep">·</span>
    <span id="stats-queued">0 queued</span>
  </footer>

  <script src="../lib/api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
